{{ define "main" }}
  <section class="page-heading">
    <span class="eyebrow">Taxonomy</span>
    <h1>{{ .Title }}</h1>
    <p>Browse notes by topic and reuse path.</p>
  </section>

  <section class="content-panel">
    <div class="term-grid">
      {{ range .Data.Terms.Alphabetical }}
        <a class="term-card" href="{{ .Page.RelPermalink }}">
          <strong>{{ .Page.Title }}</strong>
          <span>{{ .Count }} post{{ if ne .Count 1 }}s{{ end }}</span>
        </a>
      {{ end }}
    </div>
  </section>
{{ end }}
