baseURL: "https://jmaaa32.github.io/"
languageCode: "en-us"
title: "Jasper's Technical Notebook"
defaultContentLanguage: "en"
enableRobotsTXT: true
publishDir: "docs"
cleanDestinationDir: true

pagination:
  pagerSize: 8

permalinks:
  posts: "/posts/:slug/"

taxonomies:
  tag: "tags"
  category: "categories"

menu:
  main:
    - name: "Home"
      url: "/"
      weight: 10
    - name: "Posts"
      url: "/posts/"
      weight: 20
    - name: "Archives"
      url: "/archives/"
      weight: 30
    - name: "Categories"
      url: "/categories/"
      weight: 40
    - name: "Tags"
      url: "/tags/"
      weight: 50
    - name: "About"
      url: "/about/"
      weight: 60

params:
  author: "Jasper32"
  tagline: "Algorithms, systems, and engineering notes"
  description: "A practical technical notebook for algorithms, systems programming, engineering write-ups, and implementation details worth reusing."
  heroTitle: "A working index for technical notes."
  heroText: "Algorithms now, engineering and systems notes over time. Written for lookup, review, and reuse."
  github: "https://github.com/JMaaa32"

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ["$$", "$$"]
            - ["\\[", "\\]"]
          inline:
            - ["$", "$"]
            - ["\\(", "\\)"]
  highlight:
    style: "dracula"
    lineNos: false
    noClasses: true
  tableOfContents:
    startLevel: 1
    endLevel: 2
    ordered: false
