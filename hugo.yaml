baseURL: "https://jmaaa32.github.io/"
languageCode: "en-us"
title: "CP Notes"
defaultContentLanguage: "en"
enableRobotsTXT: true

pagination:
  pagerSize: 8

permalinks:
  posts: "/posts/:slug/"

taxonomies:
  tag: "tags"
  category: "categories"

menu:
  main:
    - name: "Home"
      url: "/"
      weight: 10
    - name: "Posts"
      url: "/posts/"
      weight: 20
    - name: "Archives"
      url: "/archives/"
      weight: 30
    - name: "Categories"
      url: "/categories/"
      weight: 40
    - name: "Tags"
      url: "/tags/"
      weight: 50
    - name: "About"
      url: "/about/"
      weight: 60

params:
  author: "Jasper32"
  tagline: "Notes on code, systems, and ideas"
  description: "A personal notebook for algorithms, technical write-ups, implementation details, and things worth remembering."
  heroTitle: "Technical notes, kept usable."
  heroText: "A light-weight Hugo notebook for algorithms today, broader engineering and technical notes over time."
  github: "https://github.com/JMaaa32"

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ["$$", "$$"]
            - ["\\[", "\\]"]
          inline:
            - ["$", "$"]
            - ["\\(", "\\)"]
  highlight:
    style: "github"
    lineNos: false
    noClasses: false
  tableOfContents:
    startLevel: 1
    endLevel: 4
    ordered: false
