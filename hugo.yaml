baseURL: "https://jmaaa32.github.io/"
languageCode: "en-us"
title: "CP Notes"
defaultContentLanguage: "en"
enableRobotsTXT: true

pagination:
  pagerSize: 8

permalinks:
  posts: "/posts/:slug/"

taxonomies:
  tag: "tags"
  category: "categories"

menu:
  main:
    - name: "Home"
      url: "/"
      weight: 10
    - name: "Posts"
      url: "/posts/"
      weight: 20
    - name: "Archives"
      url: "/archives/"
      weight: 30
    - name: "Categories"
      url: "/categories/"
      weight: 40
    - name: "Tags"
      url: "/tags/"
      weight: 50
    - name: "About"
      url: "/about/"
      weight: 60

params:
  author: "Jasper32"
  tagline: "Formulae & Conclusions"
  description: "Competitive programming notes, distilled into reusable formulae, proofs, and implementation templates."
  heroTitle: "Algorithm notes, cleaned up."
  heroText: "A Hugo-powered notebook for combinatorics, number theory, DP patterns, and code-ready conclusions."
  github: "https://github.com/JMaaa32"

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ["$$", "$$"]
            - ["\\[", "\\]"]
          inline:
            - ["$", "$"]
            - ["\\(", "\\)"]
  highlight:
    style: "github"
    lineNos: false
    noClasses: false
  tableOfContents:
    startLevel: 1
    endLevel: 4
    ordered: false
